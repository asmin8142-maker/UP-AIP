{% extends 'base.html' %}

{% block title %}
Удаление записи
{% endblock %}

{% block content %}

<div class="confirm-box">

    <h2>Подтверждение удаления</h2>

    <p>
        Вы уверены, что хотите удалить запись №{{ item_id }}?
    </p>

    <p class="warn">
        Это действие нельзя отменить.
    </p>

    <form method="POST">

        <button
            type="submit"
            class="btn btn-danger">

            Да, удалить

        </button>

        <a
            href="/"
            class="btn btn-secondary">

            Отмена

        </a>

    </form>

</div>

{% endblock %}
